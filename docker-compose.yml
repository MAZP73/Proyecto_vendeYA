services:
  ms_ai_processing:
    build: ./ms_ai_processing/backend/ms_ia_processing
    ports:
      - "8001:8001"
    env_file:
      - ./ms_ai_processing/backend/ms_ia_processing/.env
    restart: on-failure
    depends_on:
      - ms_post_processing
    networks:
      - tienda_network

  ms_post_processing:
    build: ./ms_post_processing/backend/ms_post_processing
    ports:
      - "8000:8000"
    env_file:
      - ./ms_post_processing/backend/ms_post_processing/.env
    restart: on-failure
    networks:
      - tienda_network

networks:
  tienda_network:
    driver: bridge